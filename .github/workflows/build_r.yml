name: Build R

on:
  # push:
  schedule:
    - cron: '0 0 11 * *'

jobs:
  linux64_build:
    name: Linux x86_64 Build
    runs-on: "ubuntu-latest"
    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
      - name: "Build"
        shell: bash
        run: |
          sudo apt-get update
          sudo apt install cmake pkg-config libfreetype6-dev libfontconfig1-dev libxcb-xfixes0-dev libxkbcommon-dev python3 libwayland-dev
          git clone --depth 1 --recursive --shallow-submodules https://github.com/raphamorim/rio
          cd rio
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          bash ../r.sh
          cargo build -p rioterm --release
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ env.version }}
          path: |
            rio/target/release/rio
          retention-days: 3

  windows64_build:
    name: Windows x86_64 Build
    runs-on: windows-latest
    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          target: "x86_64-pc-windows-msvc"
      - name: "Build"
        shell: cmd
        run: |
          git clone --depth 1 --recursive --shallow-submodules https://github.com/raphamorim/rio
          cd rio
          PATH C:\Strawberry\perl\bin;%PATH%
          bash ../r.sh
          cargo build -p rioterm --release
      - name: "Package"
        shell: bash
        run: |
          cd rio
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ env.version }}
          path: |
            rio/target/release/*.exe
          retention-days: 3

  macos_build:
    name: macOS Build
    runs-on: "macos-latest"
    steps:
      - name: "checkout repo"
        uses: actions/checkout@v4
      - name: "Install Rust"
        uses: dtolnay/rust-toolchain@stable
      - name: "Install Rust (ARM)"
        shell: bash
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      - name: "Build"
        shell: bash
        run: |
          git clone --depth 1 --recursive --shallow-submodules https://github.com/raphamorim/rio
          cd rio
          echo "version=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          bash ../r.sh
          rm -rf rust-toolchain.toml
          make release-macos
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.version }}
          path: "rio/release"
          retention-days: 3

